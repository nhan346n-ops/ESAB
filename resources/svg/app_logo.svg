<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="100%" height="100%">
  <defs>
    <!-- 背景渐变：深海科技蓝 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a192f"/>
      <stop offset="100%" stop-color="#0f3156"/>
    </linearGradient>
    
    <!-- 装饰金边/科技蓝线渐变 -->
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="100%" stop-color="#4facfe"/>
    </linearGradient>

    <!-- 声呐扇面半透明填充渐变 -->
    <linearGradient id="beamGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="0.0"/>
    </linearGradient>

    <!-- 海床三维网格渐变 -->
    <linearGradient id="gridGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4facfe" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#00f2fe" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4facfe" stop-opacity="0.3"/>
    </linearGradient>
    
    <!-- 卡片微投影 -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- 外围背景圆角卡片 -->
  <rect x="16" y="16" width="224" height="224" rx="48" fill="url(#bgGrad)" filter="url(#shadow)" stroke="url(#glowGrad)" stroke-width="2.5"/>

  <!-- 科技背景网格线 -->
  <g opacity="0.15">
    <line x1="16" y1="64" x2="240" y2="64" stroke="#00f2fe" stroke-width="1"/>
    <line x1="16" y1="112" x2="240" y2="112" stroke="#00f2fe" stroke-width="1"/>
    <line x1="16" y1="160" x2="240" y2="160" stroke="#00f2fe" stroke-width="1"/>
    <line x1="16" y1="208" x2="240" y2="208" stroke="#00f2fe" stroke-width="1"/>
    
    <line x1="64" y1="16" x2="64" y2="240" stroke="#00f2fe" stroke-width="1"/>
    <line x1="112" y1="16" x2="112" y2="240" stroke="#00f2fe" stroke-width="1"/>
    <line x1="160" y1="16" x2="160" y2="240" stroke="#00f2fe" stroke-width="1"/>
    <line x1="208" y1="16" x2="208" y2="240" stroke="#00f2fe" stroke-width="1"/>
  </g>

  <!-- 声呐测绘辐射扇面 -->
  <path d="M128,48 L38,178 A110,110 0 0,0 218,178 Z" fill="url(#beamGrad)" opacity="0.8"/>
  
  <!-- 声呐发射中心波束射线 -->
  <g stroke="url(#glowGrad)" stroke-width="1.5" opacity="0.7" stroke-dasharray="3 3">
    <line x1="128" y1="48" x2="38" y2="178"/>
    <line x1="128" y1="48" x2="68" y2="178"/>
    <line x1="128" y1="48" x2="98" y2="178"/>
    <line x1="128" y1="48" x2="128" y2="178"/>
    <line x1="128" y1="48" x2="158" y2="178"/>
    <line x1="128" y1="48" x2="188" y2="178"/>
    <line x1="128" y1="48" x2="218" y2="178"/>
  </g>

  <!-- 换能器中心源 -->
  <circle cx="128" cy="48" r="10" fill="#ffffff" filter="url(#shadow)"/>
  <circle cx="128" cy="48" r="5" fill="#00f2fe"/>
  
  <!-- 测绘出的三维波浪海床/等深线面 -->
  <!-- 前景等深线1 -->
  <path d="M30,188 Q65,160 100,180 T170,195 T226,170" fill="none" stroke="url(#gridGrad)" stroke-width="6" stroke-linecap="round"/>
  <!-- 前景等深线2 -->
  <path d="M30,203 Q65,178 100,195 T170,210 T226,188" fill="none" stroke="url(#gridGrad)" stroke-width="4.5" stroke-linecap="round" opacity="0.8"/>
  <!-- 前景等深线3 -->
  <path d="M30,218 Q65,195 100,210 T170,225 T226,203" fill="none" stroke="url(#gridGrad)" stroke-width="3" stroke-linecap="round" opacity="0.5"/>

  <!-- 波束扫测交截海底的亮点 -->
  <circle cx="56" cy="174" r="3.5" fill="#00f2fe"/>
  <circle cx="92" cy="178" r="3.5" fill="#00f2fe"/>
  <circle cx="128" cy="186" r="3.5" fill="#00f2fe"/>
  <circle cx="164" cy="193" r="3.5" fill="#00f2fe"/>
  <circle cx="202" cy="178" r="3.5" fill="#00f2fe"/>

</svg>
